"Custom Votes"
{
	"开启6s模式"
	{
		"type"			"map"
		"vote"			"1"
		"ratio"			"0.5"
		"minimum"		"1"
		"command"		"exec rgl_6s_5cp_scrim;exec pug_start;sm_map {MAP_NAME}"
		"maplist"		"6s_maps"
		"recentmaps"    "0"
		"currentmap"    "1"
		"start_notify"	"[SM] {olive}{VOTER_NAME}{default} 发起投票: 切换到6s模式 → {MAP_NAME}"
		"call_notify"	"[SM] {olive}{VOTER_NAME}{default} 投了 {yes|no}"
		"pass_notify"	"[SM] ✅ 投票通过! 正在加载6s比赛配置..."
		"fail_notify"	"[SM] ❌ 投票未通过 ({VOTE_AMOUNT}/{VOTE_REQUIRED})"
		"chattrigger"	"6s"
	}
	"开启MGE模式"
	{
		"type"			"map"
		"vote"			"1"
		"ratio"			"0.5"
		"minimum"		"1"
		"command"       "exec rgl_off;exec mge_start;sm_map {MAP_NAME}"
		"maplist"		"mge_maps"
		"recentmaps"    "0"
		"currentmap"    "1"
		"start_notify"	"[SM] {olive}{VOTER_NAME}{default} 发起投票: 切换到MGE模式 → {MAP_NAME}"
		"call_notify"	"[SM] {olive}{VOTER_NAME}{default} 投了 {yes|no}"
		"pass_notify"	"[SM] ✅ 投票通过! 正在切换到MGE练枪图..."
		"fail_notify"	"[SM] ❌ 投票未通过 ({VOTE_AMOUNT}/{VOTE_REQUIRED})"
		"chattrigger"	"mgevote"
	}
	"踢出玩家"
    {
		"type"          "players"
		"vote"          "1"
		"minimum"       "2"
		"ratio"         "0.6"
		"command"       "sm_kick #{TARGET_ID}"
		"start_notify"  "[SM] {olive}{VOTER_NAME}{default} ({VOTER_STEAMID}) 发起了踢出 {TARGET_NAME} 的投票。"
		"call_notify"	"[SM] {olive}{VOTER_NAME}{default} 投了 {yes|no}"
		"pass_notify"   "[SM] 投票通过，{TARGET_NAME} 已被踢出。"
		"fail_notify"   "[SM] 投票失败。当前票数: {VOTE_AMOUNT} 需要票数: {VOTE_REQUIRED}"
		"chattrigger"   "votekick"
    }
	"操死你"
	{
		"type"          "players"
		"vote"          "1"
		"minimum"       "2"
		"ratio"         "0.6"
		"command"       "sm_rename #{TARGET_ID} SB"
		"start_notify"  "[SM] {olive}{VOTER_NAME}{default} ({VOTER_STEAMID}) 发起了狂操 {TARGET_NAME} 的投票。"
		"call_notify"	"[SM] {olive}{VOTER_NAME}{default} 操了一下"
		"pass_notify"   "[SM] 投票通过，{TARGET_NAME} 是傻逼。"
		"fail_notify"   "[SM] 投票失败。当前票数: {VOTE_AMOUNT} 需要票数: {VOTE_REQUIRED}"
		"chattrigger"   "votefuck"
	}
	"处刑老挂友"
	{
		"type"          "players"
		"vote"          "1"
		"minimum"       "2"
		"ratio"         "0.7"
		"command"       "sm_freeze #{TARGET_ID};sm_beacon #{TARGET_ID};sm_rweapons #{TARGET_ID}"
		"start_notify"  "[SM] {olive}{VOTER_NAME}{default} 发起了处刑老挂友投票 → {TARGET_NAME}"
		"call_notify"   "[SM] {olive}{VOTER_NAME}{default} 投了 {yes|no}"
		"pass_notify"   "[SM] 投票通过，{TARGET_NAME} 将被处刑。"
		"fail_notify"   "[SM] 投票未通过 ({VOTE_AMOUNT}/{VOTE_REQUIRED})"
		"chattrigger"   "votecheat"
	}
}
